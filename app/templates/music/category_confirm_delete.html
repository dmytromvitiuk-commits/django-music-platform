{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>Видалення жанру</h1>
    <p>Ви впевнені, що хочете видалити жанр <strong>"{{ category.name }}"</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Так, видалити</button>
        <a href="{% url 'category_list' %}" class="btn">Ні, повернутися</a>
    </form>
{% endblock %}
