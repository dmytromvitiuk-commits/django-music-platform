{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>Пісня: {{ product.name }}</h1>
    <p><strong>Опис:</strong> {{ product.description }}</p>
    
    <a href="{% url 'product_update' product.id %}" class="btn">Редагувати</a>
    <a href="{% url 'product_delete' product.id %}" class="btn btn-danger">Видалити</a>
    <br><br>
    <a href="{% url 'product_list' %}">← Назад до списку</a>
{% endblock %}
