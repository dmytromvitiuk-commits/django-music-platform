{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>Жанр: {{ category.name }}</h1>
    <p><strong>Опис:</strong> {{ category.description }}</p>
    
    <a href="{% url 'category_update' category.id %}" class="btn">Редагувати</a>
    <a href="{% url 'category_delete' category.id %}" class="btn btn-danger">Видалити</a>
    <br><br>
    <a href="{% url 'category_list' %}">← Назад до списку</a>
{% endblock %}
