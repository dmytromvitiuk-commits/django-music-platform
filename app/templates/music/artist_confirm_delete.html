{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>Видалення Виконавців</h1>
    <p>Ви впевнені, що хочете видалити Виконавця <strong>"{{ artist.name }}"</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Так, видалити</button>
        <a href="{% url 'artist_list' %}" class="btn">Ні, повернутися</a>
    </form>
{% endblock %}
